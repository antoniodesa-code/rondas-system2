version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ronda_postgres
    environment:
      POSTGRES_USER: ronda_user
      POSTGRES_PASSWORD: ronda_pass
      POSTGRES_DB: ronda_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ronda_user -d ronda_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ronda_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: ronda_backend
    environment:
      DATABASE_URL: postgresql+psycopg2://ronda_user:ronda_pass@postgres:5432/ronda_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ronda-hospitalar-secret-key-2024-mude-em-producao-xk9p2m
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      QR_EXPIRATION_SECONDS: 120
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
